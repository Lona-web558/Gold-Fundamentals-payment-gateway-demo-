<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gold Fundamentals Core Gateway</title>
    <link href="https://jsdelivr.net" rel="stylesheet">
</head>
<body class="bg-light">

    <div class="container d-flex justify-content-center align-items-center min-vh-100">
        <div class="card p-4 shadow-sm border-0" style="max-width: 450px; width: 100%;">
            <h4 class="text-center fw-bold text-dark mb-4">Gold Fundamentals Gateway</h4>
            
            <form id="gatewayPaymentForm">
                <div class="mb-3">
                    <label class="form-label text-muted small fw-bold">CARDHOLDER NAME</label>
                    <input type="text" class="form-control" placeholder="J Doe" required>
                </div>
                
                <div class="mb-3">
                    <label class="form-label text-muted small fw-bold">CARD NUMBER</label>
                    <input type="text" id="cardNumber" class="form-control form-control-lg" placeholder="4111 1111 1111 1111" required>
                </div>

                <div class="row">
                    <div class="col-7 mb-4">
                        <label class="form-label text-muted small fw-bold">EXPIRATION DATE</label>
                        <div class="input-group">
                            <input type="text" id="expMonth" class="form-control text-center" placeholder="MM" maxlength="2" required>
                            <input type="text" id="expYear" class="form-control text-center" placeholder="YY" maxlength="2" required>
                        </div>
                    </div>
                    <div class="col-5 mb-4">
                        <label class="form-label text-muted small fw-bold">SECURITY CODE</label>
                        <input type="password" id="cvc" class="form-control text-center" placeholder="CVC" maxlength="3" required>
                    </div>
                </div>

                <button type="submit" id="submitBtn" class="btn btn-dark btn-lg w-100 fw-bold">Authorize Payment</button>
            </form>
            
            <div id="statusAlert" class="mt-3 alert d-none text-center small"></div>
        </div>
    </div>

    <script>
        document.getElementById('gatewayPaymentForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const submitBtn = document.getElementById('submitBtn');
            submitBtn.disabled = true;
            submitBtn.innerText = "Processing Secures...";

            // Pack card metadata variables
            const cardData = {
                card_number: document.getElementById('cardNumber').value.replace(/\s+/g, ''),
                cvc: document.getElementById('cvc').value,
                expiry_month: document.getElementById('expMonth').value,
                expiry_year: document.getElementById('expYear').value
            };

            try {
                // Step 1: Send card credentials to Tokenization engine core
                const tokenResponse = await fetch('http://localhost:8080/v1/tokens', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(cardData)
                });
                const tokenResult = await tokenResponse.json();

                if (!tokenResult.token) throw new Error("Tokenization Protocol Failed");

                // CRITICAL SECURITY FLUSH: Wipe raw data instantly out of client-side DOM input variables
                document.getElementById('cardNumber').value = "";
                document.getElementById('cvc').value = "";

                // Step 2: Use the safe token reference string to execute the direct charge against the bank switch
                const chargeResponse = await fetch('http://localhost:8080/v1/charges', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        amount: 50000, // Representing R500.00
                        currency: "ZAR",
                        token: tokenResult.token,
                        merchant_id: "mer_gold_fundamentals_1"
                    })
                });
                const chargeResult = await chargeResponse.json();

                if (chargeResult.status === "succeeded") {
                    updateStatus("SUCCESS: Bank authorized transaction via custom core switch!", "alert-success");
                } else {
                    updateStatus(`DECLINED: ${chargeResult.error}`, "alert-danger");
                }

            } catch (err) {
                updateStatus("GATEWAY ERROR: Transaction rejected or communication link dropped.", "alert-danger");
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerText = "Authorize Payment";
            }
        });

        function updateStatus(text, bootstrapClass) {
            const el = document.getElementById('statusAlert');
            el.className = `mt-3 alert ${bootstrapClass} text-center small`;
            el.innerText = text;
            el.classList.remove('d-none');
        }
    </script>
</body>
</html>
